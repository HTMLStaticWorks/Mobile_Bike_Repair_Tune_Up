<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RepairHub</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="assets/images/favicon.svg">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        body,
        html {
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color-alt);
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius-lg);
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            position: relative;
        }

        @media (max-width: 600px) {
            .auth-card {
                padding: 32px 24px;
                box-shadow: none;
                border: none;
                background-color: transparent;
            }

            body {
                background-color: var(--bg-color);
                overflow-y: auto;
            }

            .auth-container {
                min-height: auto;
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo a {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-divider::before {
            margin-right: 16px;
        }

        .auth-divider::after {
            margin-left: 16px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            border-radius: var(--border-radius);
            font-weight: 600;
            margin-bottom: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border-color);
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .social-google {
            background-color: #FFFFFF;
            color: #333333;
        }

        .social-google:hover {
            background-color: #f9fafb;
        }

        .social-apple {
            background-color: #000000;
            color: #FFFFFF;
        }

        .dark-mode .social-google {
            background-color: #1E293B;
            color: #F1F5F9;
        }

        .dark-mode .social-google:hover {
            background-color: #334155;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 16px;
        }
    </style>
</head>

<body>


    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-logo">
                <a href="index.html">
                    <img src="assets/images/logo.svg" alt="RepairHub Logo" class="brand-logo">
                </a>
            </div>

            <div class="auth-title">
                <h2 style="font-size: 1.2rem; margin-bottom: 8px;">Welcome Back to RepairHub</h2>
                <p style="margin: 0; color: var(--text-secondary);">Log in to manage your bookings and service history.
                </p>
            </div>

            <form action="dashboard.html">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <div class="flex justify-between items-center mb-1">
                        <label class="form-label" for="password" style="margin: 0;">Password</label>
                        <a href="#" class="text-primary font-weight-bold" style="font-size: 0.85rem;">Forgot
                            Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-password"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="checkbox-container"
                    style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                    <input type="checkbox" id="rememberMe"
                        style="width: 18px; height: 18px; accent-color: var(--primary-color); cursor: pointer;">
                    <label for="rememberMe"
                        style="font-size: 0.9rem; color: var(--text-primary); cursor: pointer; margin: 0;">Remember
                        me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top: 0;">Log In</button>
            </form>

            <div class="auth-divider">Or continue with</div>

            <div class="flex gap-2">
                <button class="social-btn social-google">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19.9895 10.1871C19.9895 9.36767 19.9214 8.76973 19.7742 8.14966H10.1992V11.848H15.8195C15.7062 12.7671 15.0943 14.1512 13.7346 15.0813L13.7155 15.2051L16.7429 17.4969L16.9527 17.5174C18.8789 15.7789 19.9895 13.221 19.9895 10.1871Z"
                            fill="#4285F4" />
                        <path
                            d="M10.1993 19.9313C12.9527 19.9313 15.2643 19.0454 16.9527 17.5174L13.7346 15.0813C12.8734 15.6682 11.7176 16.0779 10.1993 16.0779C7.50243 16.0779 5.21352 14.3395 4.39759 11.9366L4.27799 11.9465L1.13003 14.3273L1.08887 14.4391C2.76588 17.6945 6.21061 19.9313 10.1993 19.9313Z"
                            fill="#34A853" />
                        <path
                            d="M4.39748 11.9366C4.18219 11.3166 4.05759 10.6521 4.05759 9.96565C4.05759 9.27909 4.18219 8.61473 4.38615 7.99466L4.38045 7.8626L1.19304 5.44366L1.08875 5.49214C0.397576 6.84305 0.000976562 8.36008 0.000976562 9.96565C0.000976562 11.5712 0.397576 13.0882 1.08875 14.4391L4.39748 11.9366Z"
                            fill="#FBBC05" />
                        <path
                            d="M10.1993 3.85336C12.1142 3.85336 13.406 4.66168 14.1425 5.33717L17.0207 2.59107C15.253 0.985496 12.9527 0 10.1993 0C6.2106 0 2.76588 2.23672 1.08887 5.49214L4.38626 7.99466C5.21352 5.59183 7.50242 3.85336 10.1993 3.85336Z"
                            fill="#EB4335" />
                    </svg>
                    Google
                </button>
                <button class="social-btn social-apple">
                    <i class="fa-brands fa-apple" style="font-size: 1.3rem;"></i>
                    Apple
                </button>
            </div>

            <p class="text-center mt-4 mb-2" style="font-size: 0.95rem;">
                New here? <a href="register.html" class="text-primary" style="font-weight: 600;">Create Account</a>
            </p>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>

</html>
